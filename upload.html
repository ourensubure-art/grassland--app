<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>上报草场观察 - 草原AI协作平台</title>
  <style>
    :root {
      --bg: #FAF6EC;
      --green: #4A7C3A;
      --orange: #E89253;
      --text: #253321;
      --muted: #6A735F;
      --card: #FFFFFF;
      --line: #DDE6D4;
      --soft-green: #EEF6E8;
      --disabled: #B9BDB1;
      --shadow: 0 10px 28px rgba(74, 124, 58, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      color: var(--text); background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
    }
    .app { width: min(100%, 480px); margin: 0 auto; padding: 16px 16px 32px; }
    .topbar { display: grid; grid-template-columns: 72px 1fr 72px; align-items: center; min-height: 52px; margin-bottom: 12px; }
    .back-btn { width: 64px; min-height: 42px; border: 0; border-radius: 12px; color: var(--green); background: rgba(255,255,255,0.72); font-size: 17px; font-weight: 800; cursor: pointer; }
    .page-title { margin: 0; text-align: center; color: var(--green); font-size: 22px; line-height: 1.3; font-weight: 900; }
    .card { margin-top: 16px; padding: 18px; border-radius: 16px; background: var(--card); box-shadow: var(--shadow); }
    .section-title { margin: 0 0 12px; font-size: 20px; line-height: 1.3; font-weight: 900; }
    .photo-box { position: relative; min-height: 220px; overflow: hidden; border: 2px dashed rgba(74,124,58,0.55); border-radius: 16px; background: #FBFDF8; }
    .photo-box:focus-within { border-color: var(--green); box-shadow: 0 0 0 4px rgba(74,124,58,0.12); }
    .photo-input { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    .photo-trigger { position: absolute; inset: 0; display: grid; place-items: center; cursor: pointer; }
    .photo-empty { display: grid; place-items: center; gap: 10px; padding: 24px; text-align: center; color: var(--green); font-weight: 900; }
    .photo-icon { font-size: 58px; line-height: 1; }
    .photo-text { font-size: 19px; line-height: 1.45; }
    .preview-image { display: none; width: 100%; height: 100%; min-height: 220px; object-fit: cover; }
    .photo-box.has-image .photo-empty { display: none; }
    .photo-box.has-image .preview-image { display: block; }
    .remove-photo { position: absolute; top: 10px; right: 10px; display: none; width: 34px; min-height: 34px; border: 0; border-radius: 999px; color: #FFF; background: rgba(37,51,33,0.72); font-size: 24px; line-height: 1; cursor: pointer; z-index: 2; }
    .photo-box.has-image .remove-photo { display: grid; place-items: center; }
    .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .location-item { padding: 12px; border-radius: 12px; background: #F6FAF0; }
    .location-label { display: block; color: var(--muted); font-size: 14px; font-weight: 700; }
    .location-value { display: block; margin-top: 6px; color: var(--green); font-size: 20px; font-weight: 900; }
    .location-status { margin: 0; color: var(--muted); line-height: 1.5; font-weight: 700; }
    .field-label { display: block; margin-bottom: 10px; font-size: 18px; line-height: 1.4; font-weight: 900; }
    textarea { width: 100%; min-height: 148px; resize: vertical; padding: 14px; border: 1px solid var(--line); border-radius: 16px; color: var(--text); background: #FBFDF8; font: inherit; line-height: 1.6; outline: none; }
    textarea:focus { border-color: var(--green); box-shadow: 0 0 0 4px rgba(74,124,58,0.12); }
    .counter { margin-top: 8px; text-align: right; color: var(--muted); font-size: 15px; font-weight: 700; }
    .submit-btn, .success-btn { width: 100%; min-height: 58px; border: 0; border-radius: 12px; font-size: 18px; font-weight: 900; cursor: pointer; }
    .submit-btn { margin-top: 18px; color: #FFF; background: var(--green); }
    .submit-btn:disabled { color: #FFF; background: var(--disabled); cursor: not-allowed; }
    .success-view { display: none; margin-top: 18px; text-align: center; }
    .success-icon { font-size: 72px; line-height: 1; }
    .success-view h2 { margin: 12px 0 16px; color: var(--green); font-size: 28px; line-height: 1.3; font-weight: 900; }
    .ai-card { padding: 18px; border-radius: 16px; background: var(--soft-green); text-align: left; box-shadow: var(--shadow); }
    .ai-card h3 { margin: 0 0 10px; color: var(--green); font-size: 21px; line-height: 1.3; font-weight: 900; }
    .ai-card p { margin: 0; color: var(--text); line-height: 1.75; white-space: pre-line; font-weight: 650; }
    .ai-loading { display: inline-block; color: var(--muted); }
    .ai-loading::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
    .success-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .success-btn.primary { color: #FFF; background: var(--green); }
    .success-btn.secondary { color: var(--green); border: 2px solid var(--green); background: #FFF; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 16px 24px; border-radius: 12px; color: #FFF; font-weight: 900; font-size: 15px; line-height: 1.5; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 9999; max-width: 90%; text-align: center; white-space: pre-line; }
    .toast.success { background: #4A7C3A; }
    .toast.error { background: #D9534F; }
    .toast.info { background: #5B7FB8; }
    @media (max-width: 360px) {
      .topbar { grid-template-columns: 64px 1fr 64px; }
      .location-grid, .success-actions { grid-template-columns: 1fr; }
    }
  </style>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <button class="back-btn" type="button" onclick="goBack()">← 返回</button>
      <h1 class="page-title">上报草场观察</h1>
      <div aria-hidden="true"></div>
    </header>

    <section id="formView">
      <section class="card">
        <h2 class="section-title">拍照记录</h2>
        <div id="photoBox" class="photo-box">
          <input id="photoInput" class="photo-input" type="file" accept="image/*" capture="environment">
          <label class="photo-trigger" for="photoInput">
            <div class="photo-empty">
              <div class="photo-icon">📸</div>
              <div class="photo-text">点击拍照或选择图片</div>
            </div>
            <img id="previewImage" class="preview-image" alt="预览">
          </label>
          <button id="removePhoto" class="remove-photo" type="button">×</button>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">📍 当前位置</h2>
        <p id="locationStatus" class="location-status">定位中...</p>
        <div class="location-grid">
          <div class="location-item">
            <span class="location-label">纬度</span>
            <span id="latitudeText" class="location-value">--</span>
          </div>
          <div class="location-item">
            <span class="location-label">经度</span>
            <span id="longitudeText" class="location-value">--</span>
          </div>
        </div>
      </section>

      <section class="card">
        <label class="field-label" for="descriptionInput">描述今天看到的草场情况：</label>
        <textarea id="descriptionInput" rows="5" placeholder="比如：草还很短，返青慢；或者草长得不错..."></textarea>
        <div id="charCounter" class="counter">已输入 0 字</div>
      </section>

      <button id="submitButton" class="submit-btn" type="button" disabled>提交上报</button>
    </section>

    <section id="successView" class="success-view">
      <div class="success-icon">✅</div>
      <h2>上报成功！</h2>
      <article class="ai-card">
        <h3>🌱 AI放牧建议</h3>
        <p id="aiSuggestionText"><span class="ai-loading">AI 正在分析中</span></p>
      </article>
      <div class="success-actions">
        <button class="success-btn primary" type="button" onclick="resetReport()">📸 再上报一次</button>
        <button class="success-btn secondary" type="button" onclick="goHome()">🏠 返回首页</button>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const SUPABASE_URL = 'https://jqubxwcjupapeaknfzpi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_MndnE02o-5Q5xN7_rNyIhQ_1Ur7k8cq';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // 🤖 Gemini API 配置
    const GEMINI_API_KEY = 'AQ.Ab8RN6LCqMwL3WTawAfAnMDel_IPgNeAefF9pw30BZFH9yvuVw';
    const GEMINI_MODEL = 'gemini-2.5-flash';

    // 🌟 页面顶部浮动提示
    function showToast(msg, type = 'info', duration = 5000) {
      const toast = document.createElement("div");
      toast.className = `toast ${type}`;
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), duration);
      console.log(`[${type.toUpperCase()}]`, msg);
    }

    const formView = document.querySelector("#formView");
    const successView = document.querySelector("#successView");
    const photoBox = document.querySelector("#photoBox");
    const photoInput = document.querySelector("#photoInput");
    const previewImage = document.querySelector("#previewImage");
    const removePhoto = document.querySelector("#removePhoto");
    const locationStatus = document.querySelector("#locationStatus");
    const latitudeText = document.querySelector("#latitudeText");
    const longitudeText = document.querySelector("#longitudeText");
    const descriptionInput = document.querySelector("#descriptionInput");
    const charCounter = document.querySelector("#charCounter");
    const submitButton = document.querySelector("#submitButton");
    const aiSuggestionText = document.querySelector("#aiSuggestionText");

    let selectedFile = null;
    let currentLat = 43.85;
    let currentLng = 116.05;

    if (!supabase) {
      showToast("❌ Supabase 未加载！", 'error', 10000);
    } else {
      console.log('✅ Supabase 客户端已加载');
    }

    window.goBack = function() {
      if (window.history.length > 1) history.back();
      else window.location.href = "weather.html";
    };
    window.goHome = function() {
      window.location.href = "weather.html";
    };
    window.resetReport = function() {
      selectedFile = null;
      photoInput.value = "";
      previewImage.removeAttribute("src");
      photoBox.classList.remove("has-image");
      descriptionInput.value = "";
      charCounter.textContent = "已输入 0 字";
      submitButton.textContent = "提交上报";
      aiSuggestionText.innerHTML = '<span class="ai-loading">AI 正在分析中</span>';
      updateSubmitState();
      successView.style.display = "none";
      formView.style.display = "block";
      getLocation();
    };

    photoInput.addEventListener("change", () => {
      const file = photoInput.files && photoInput.files[0];
      if (!file) return;
      selectedFile = file;
      previewImage.src = URL.createObjectURL(file);
      photoBox.classList.add("has-image");
      updateSubmitState();
    });

    removePhoto.addEventListener("click", (event) => {
      event.preventDefault();
      event.stopPropagation();
      selectedFile = null;
      photoInput.value = "";
      previewImage.removeAttribute("src");
      photoBox.classList.remove("has-image");
      updateSubmitState();
    });

    function getLocation() {
      if (!navigator.geolocation) { useDefaultLocation(); return; }
      locationStatus.textContent = "定位中...";
      navigator.geolocation.getCurrentPosition(
        (position) => {
          currentLat = position.coords.latitude;
          currentLng = position.coords.longitude;
          locationStatus.textContent = "已获取当前位置";
          latitudeText.textContent = `${currentLat.toFixed(2)}°N`;
          longitudeText.textContent = `${currentLng.toFixed(2)}°E`;
        },
        () => useDefaultLocation(),
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 60000 }
      );
    }

    function useDefaultLocation() {
      locationStatus.textContent = "定位失败，使用默认位置：43.85°N, 116.05°E";
      latitudeText.textContent = "43.85°N";
      longitudeText.textContent = "116.05°E";
      currentLat = 43.85;
      currentLng = 116.05;
    }

    descriptionInput.addEventListener("input", () => {
      const count = descriptionInput.value.trim().length;
      charCounter.textContent = `已输入 ${count} 字`;
      updateSubmitState();
    });

    function updateSubmitState() {
      const hasImage = Boolean(selectedFile);
      const hasDescription = descriptionInput.value.trim().length > 0;
      submitButton.disabled = !(hasImage || hasDescription);
    }

    // 🖼️ 把图片文件转成 Base64
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          // reader.result 是 "data:image/jpeg;base64,xxx" 形式
          const base64 = reader.result.split(',')[1];
          const mimeType = file.type || 'image/jpeg';
          resolve({ base64, mimeType });
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // 🤖 调用 Gemini API 生成放牧建议
    async function getGeminiSuggestion(description, file, lat, lng) {
      const prompt = `你是一位经验丰富的草原牧业专家，正在协助内蒙古锡林郭勒盟的牧民进行可持续放牧决策。

【牧民观察信息】
- 位置：北纬 ${lat.toFixed(2)}°，东经 ${lng.toFixed(2)}°
- 牧民描述：${description || '（未填写描述）'}
${file ? '- 牧民同时上传了一张草场照片，请仔细观察照片中的草场返青情况、植被密度、土壤状况等。' : ''}

【你的任务】
请基于${file ? '照片和' : ''}牧民描述，给出 3 条具体、可执行的放牧建议。

【输出要求】
- 用简短朴实的中文，每条建议 1-2 句话
- 牧民文化水平不高，避免使用复杂术语
- 格式严格按照下面这样：

根据你的描述${file ? '和照片' : ''}，[一句话总结当前草场状况]。建议：
1. [第一条建议]
2. [第二条建议]
3. [第三条建议]`;

      // 构造请求体
      const parts = [{ text: prompt }];
      
      // 如果有图片，加入图片
      if (file) {
        const { base64, mimeType } = await fileToBase64(file);
        parts.push({
          inline_data: {
            mime_type: mimeType,
            data: base64
          }
        });
      }

      const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
      
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts }],
          generationConfig: {
  temperature: 0.7,
  maxOutputTokens: 2048,
  thinkingConfig: {
    thinkingBudget: 0
  }
}
        })
      });

      const data = await res.json();
      console.log('🤖 Gemini 返回:', data);

      if (data.error) {
        throw new Error(`Gemini API 错误: ${data.error.message}`);
      }

      const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!text) {
        throw new Error('Gemini 未返回有效内容');
      }
      return text.trim();
    }

    // 🌟 提交逻辑：上传图片 → 保存数据库 → 调用 Gemini → 显示建议
    submitButton.addEventListener("click", async () => {
      if (submitButton.disabled) return;

      submitButton.disabled = true;
      submitButton.textContent = "上传中...";
      showToast("📤 正在上传...", 'info', 2000);

      try {
        // 第 1 步：上传图片到 Supabase Storage
        let photoUrl = null;
        if (selectedFile) {
          console.log('开始上传图片:', selectedFile.name);
          const fileName = `${Date.now()}-${selectedFile.name.replace(/[^a-zA-Z0-9._-]/g, '_')}`;
          const { data: uploadData, error: uploadError } = await supabase
            .storage.from('photos').upload(fileName, selectedFile);
          
          if (uploadError) {
            throw new Error(`图片上传失败: ${uploadError.message}`);
          }
          const { data: urlData } = supabase.storage.from('photos').getPublicUrl(fileName);
          photoUrl = urlData.publicUrl;
          console.log('✅ 图片URL:', photoUrl);
        }

        // 第 2 步：先把观察记录存进数据库（AI 建议先标记"分析中"）
        submitButton.textContent = "保存数据中...";
        const insertData = {
          photo_url: photoUrl,
          description: descriptionInput.value.trim() || '无描述',
          ai_suggestion: 'AI 分析中...',
          latitude: currentLat,
          longitude: currentLng
        };

        const { data: dbData, error: dbError } = await supabase
          .from('observations')
          .insert([insertData])
          .select();

        if (dbError) {
          throw new Error(`数据库错误: ${dbError.message}`);
        }
        console.log('✅ 数据已保存:', dbData);
        const observationId = dbData[0].id;

        // 第 3 步：上报成功，立即显示成功页（AI 建议位置先显示"分析中"）
        showToast("🎉 上报成功！AI 正在分析...", 'success', 2500);
        formView.style.display = "none";
        successView.style.display = "block";
        aiSuggestionText.innerHTML = '<span class="ai-loading">AI 正在分析中</span>';
        window.scrollTo(0, 0);

        // 第 4 步：调用 Gemini 生成真实建议
        try {
          const suggestion = await getGeminiSuggestion(
            descriptionInput.value.trim(),
            selectedFile,
            currentLat,
            currentLng
          );
          console.log('✅ AI 建议:', suggestion);

          // 显示建议
          aiSuggestionText.textContent = suggestion;

          // 第 5 步：把真实建议更新回数据库
          const { error: updateError } = await supabase
            .from('observations')
            .update({ ai_suggestion: suggestion })
            .eq('id', observationId);
          
          if (updateError) {
            console.warn('⚠️ AI 建议未能更新到数据库:', updateError);
          } else {
            console.log('✅ AI 建议已更新到数据库');
          }

        } catch (aiErr) {
          console.error('❌ AI 分析失败:', aiErr);
          aiSuggestionText.textContent = `⚠️ AI 暂时无法生成建议\n\n错误：${aiErr.message}\n\n请稍后再试，或参考你自己的经验做决策。`;
        }

      } catch (err) {
        console.error('提交失败:', err);
        showToast(`❌ 上传失败\n${err.message || err}`, 'error', 8000);
        submitButton.disabled = false;
        submitButton.textContent = "提交上报";
      }
    });

    getLocation();
    updateSubmitState();
  </script>
</body>
</html>
