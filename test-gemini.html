<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>测试 Gemini</title></head>
<body>
  <h1>测试 Gemini API</h1>
  <button onclick="test()">点我测试</button>
  <pre id="result" style="background:#eee;padding:20px;white-space:pre-wrap;"></pre>

  <script>
   const API_KEY = 'AQ.Ab8RN6LCqMwL3WTawAfAnMDel_IPgNeAefF9pw30BZFH9yvuVw'; // ⚠️ 改这里！

    async function test() {
      document.getElementById('result').textContent = '请求中...';
      try {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
          {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              contents: [{parts: [{text: '你好，用一句话介绍草原放牧'}]}]
            })
          }
        );
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('result').textContent = '错误：' + e.message;
      }
    }
  </script>
</body>
</html>
